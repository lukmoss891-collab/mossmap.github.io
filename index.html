<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>MOSS ROUTES MANAGER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #ff0000; 
            --dark: #0f172a; 
            --black: #000000;
            --white: #ffffff;
            --border: #e2e8f0; 
            --bg: #f8fafc; 
            --gold: #f59e0b; 
            --start-blue: #2787F5;
            --end-green: #22c55e; 
        }

        body { margin: 0; font-family: 'IBM Plex Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        /* PŮVODNÍ SPLASH SCREEN */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f4f4f4;
            background-image: repeating-linear-gradient(45deg, #eeeeee 0px, #eeeeee 2px, #f4f4f4 2px, #f4f4f4 10px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #loader-wrapper.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-content { width: max-content; padding: 40px; text-align: left; }
        .loader-title { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 600; color: var(--black); letter-spacing: 1px; margin-bottom: 15px; }
        .rect { background: var(--accent); height: 29px; width: 100%; margin-bottom: 8px; animation: drawRect 1.2s cubic-bezier(0.7, 0, 0.3, 1) forwards; }
        .rect-thin { height: 15px; animation-delay: 0.2s; background: var(--accent); width: 0; animation: drawRect 1.2s cubic-bezier(0.7, 0, 0.3, 1) forwards 0.2s; }
        @keyframes drawRect { from { width: 0; } to { width: 100%; } }

        /* UI STRUKTURA */
        #panel { width: 420px; border-right: 1px solid var(--border); background: white; display: flex; flex-direction: column; z-index: 1000; box-shadow: 4px 0 15px rgba(0,0,0,0.05); }
        .tab-nav { background: var(--black); padding: 15px; color: white; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 2px; border-bottom: 3px solid var(--accent); }
        .section { padding: 20px; border-bottom: 1px solid var(--border); }
        h1 { font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; color: #64748b; margin: 0 0 15px 0; display: flex; align-items: center; gap: 8px; }
        h1::before { content: ''; width: 3px; height: 12px; background: var(--accent); border-radius: 2px; }
        
        .btn { width: 100%; padding: 12px; cursor: pointer; border-radius: 8px; border: none; font-weight: 600; font-size: 13px; transition: 0.2s; background: var(--black); color: white; }
        .btn:hover { background: var(--accent); }
        
        .route-item { padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .route-item:hover { background: #f8fafc; }
        .route-item.active { background: #fff1f2; border-left: 4px solid var(--accent); }
        
        /* MAPA A INFO BOX */
        #map { flex-grow: 1; z-index: 1; background: #cbd5e1; position: relative; }
        
        #route-info-box {
            position: absolute; top: 20px; right: 20px; width: 320px; background: white; z-index: 2000;
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid var(--border);
            overflow: hidden; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            transform: translateX(100%); opacity: 0; pointer-events: none;
        }
        #route-info-box.visible { transform: translateX(0); opacity: 1; pointer-events: auto; }

        .p-container { padding: 20px; }
        .p-header { border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-start; }
        .p-title { color: var(--black); font-weight: 700; font-size: 16px; line-height: 1.2; }
        .p-close { cursor: pointer; color: #94a3b8; font-size: 24px; line-height: 1; transition: 0.2s; }
        .p-close:hover { color: var(--accent); }
        .p-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px; color: #334155; }
        .p-icon { width: 28px; font-size: 16px; }
        .p-note { background: #f8fafc; border-radius: 8px; padding: 12px; font-size: 12px; color: #475569; margin-top: 12px; border-left: 4px solid var(--accent); line-height: 1.5; white-space: pre-line; }

        /* PULZUJÍCÍ BODY */
        .glow-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.3); position: relative; }
        .glow-dot::before { 
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; 
            border-radius: 50%; animation: pulse-glow 1s infinite; opacity: 0.6; 
        }
        .dot-start { background: var(--start-blue); }
        .dot-start::before { background: var(--start-blue); }
        .dot-end { background: var(--end-green); }
        .dot-end::before { background: var(--end-green); }

        @keyframes pulse-glow { 
            0% { transform: scale(1); opacity: 0.7; } 
            100% { transform: scale(2.8); opacity: 0; } 
        }

        .status-bar { padding: 10px 20px; font-size: 10px; color: #94a3b8; border-top: 1px solid var(--border); display: flex; gap: 10px; background: white; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #cbd5e1; }
        .dot-green { background: #22c55e; }
    </style>
</head>
<body>

<div id="loader-wrapper">
    <div class="loader-content">
        <div class="loader-title">MOSS ROUTES MANAGER (beta)</div>
        <div class="rect"></div>
        <div class="rect-thin"></div>
    </div>
</div>

<div id="panel">
    <div class="tab-nav">MOSS ROUTES MANAGER</div>
    <div class="section">
        <h1>Vyhledávání</h1>
        <div style="display:flex; gap: 5px;">
            <input type="text" id="viewerDept" placeholder="Zadej Dept (např. 85)" style="flex:1; padding:10px; border:1px solid var(--border); border-radius:8px; font-family: 'IBM Plex Mono';">
            <button class="btn" style="width:auto; margin:0; padding:0 15px;" onclick="filterByDept()">ZOBRAZIT</button>
        </div>
    </div>
    <div id="route-list" style="flex-grow:1; overflow-y:auto;"></div>
    <div class="status-bar">
        <span><span id="dot-db" class="status-dot"></span> DATABASE</span>
        <span><span id="dot-geo" class="status-dot"></span> GEODATA</span>
    </div>
</div>

<div id="map">
    <div id="route-info-box">
        <div class="p-container">
            <div class="p-header">
                <span id="info-title" class="p-title">Název trasy</span>
                <span class="p-close" onclick="closeInfoBox()">&times;</span>
            </div>
            <div class="p-row">
                <span class="p-icon">📏</span>
                <span><b>Vzdálenost:</b> <span id="info-dist">---</span> km</span>
            </div>
            <div class="p-row">
                <span class="p-icon">💶</span>
                <span><b>Cena:</b> <span id="info-price">---</span> €</span>
            </div>
            <div id="info-note-container" class="p-note">
                <b>Poznámka:</b><br><span id="info-note">---</span>
            </div>
        </div>
    </div>
</div>

<script>
    let allRoutes = [];
    let franceBorders = null;
    
    const map = L.map('map', { zoomControl: false }).setView([46.6, 2.2], 6);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    let routeLayers = L.featureGroup().addTo(map);
    let highlightLayer = L.layerGroup().addTo(map);
    let borderLayer = L.layerGroup().addTo(map);
    let markersLayer = L.layerGroup().addTo(map);

    function decodePolyline(str) {
        let index = 0, lat = 0, lng = 0, coords = [], shift, result, byte;
        while (index < str.length) {
            shift = 0; result = 0;
            do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
            lat += ((result & 1) ? ~(result >> 1) : (result >> 1));
            shift = 0; result = 0;
            do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
            lng += ((result & 1) ? ~(result >> 1) : (result >> 1));
            coords.push([lat / 1e5, lng / 1e5]);
        }
        return coords;
    }

    async function initData() {
        setTimeout(() => { document.getElementById('loader-wrapper').classList.add('hidden'); }, 2500);
        try {
            const res = await fetch('routes.json');
            allRoutes = await res.json();
            document.getElementById('dot-db').classList.add('dot-green');
        } catch (e) { console.error("Database error"); }

        try {
            const res = await fetch('france.json');
            franceBorders = await res.json();
            document.getElementById('dot-geo').classList.add('dot-green');
        } catch (e) { console.error("GeoData error"); }
    }
    initData();

    function filterByDept() {
        const val = document.getElementById('viewerDept').value.trim();
        if (!val) return;
        
        const container = document.getElementById('route-list');
        container.innerHTML = '';
        routeLayers.clearLayers();
        borderLayer.clearLayers();
        highlightLayer.clearLayers();
        markersLayer.clearLayers();
        closeInfoBox();

        if (franceBorders) {
            const deptShape = franceBorders.features.find(f => String(f.properties.code) === val);
            if (deptShape) {
                L.geoJSON(deptShape, {
                    style: { color: '#ff0000', weight: 2, fillColor: '#ff0000', fillOpacity: 0.05, dashArray: '5, 8' }
                }).addTo(borderLayer);
            }
        }

        const filtered = allRoutes.filter(r => String(r.dept) === val);
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="padding:20px; color:#94a3b8; font-size:12px; text-align:center;">Žádné trasy pro tento sektor.</div>';
            return;
        }

        filtered.forEach(r => {
            const coords = decodePolyline(r.geom);
            const ghost = L.polyline(coords, { color: '#000', weight: 5, opacity: 0.15 }).addTo(routeLayers);
            
            const div = document.createElement('div');
            div.className = 'route-item';
            div.innerHTML = `<strong>${r.name}</strong><br><small>${r.distance} km</small>`;
            div.onclick = () => activateRoute(r, div, coords);
            container.appendChild(div);

            ghost.on('click', () => div.click());
        });

        const bounds = L.featureGroup([routeLayers, borderLayer]).getBounds();
        if (bounds.isValid()) map.flyToBounds(bounds, { padding: [50, 50], duration: 1.5 });
    }

    function activateRoute(r, element, coords) {
        document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
        if (element) element.classList.add('active');
        
        highlightLayer.clearLayers();
        markersLayer.clearLayers();

        const activeLine = L.polyline(coords, { color: '#ff0000', weight: 6, lineJoin: 'round' }).addTo(highlightLayer);
        
        // MARKERY: Modrý start, Zelený cíl
        if (r.wps && r.wps.length >= 2) {
            const startPos = r.wps[0].l;
            const endPos = r.wps[r.wps.length - 1].l;
            
            L.marker([startPos.lat, startPos.lng], { 
                icon: L.divIcon({ className: 'glow-dot dot-start', iconSize: [14, 14] }),
                interactive: false 
            }).addTo(markersLayer);
            
            L.marker([endPos.lat, endPos.lng], { 
                icon: L.divIcon({ className: 'glow-dot dot-end', iconSize: [14, 14] }),
                interactive: false 
            }).addTo(markersLayer);
        }

        // INFO BOX DATA
        document.getElementById('info-title').innerText = r.name;
        document.getElementById('info-dist').innerText = r.distance;
        document.getElementById('info-price').innerText = r.price || '---';
        
        const noteContainer = document.getElementById('info-note-container');
        if (r.note && r.note.trim() !== "") {
            document.getElementById('info-note').innerText = r.note;
            noteContainer.style.display = 'block';
        } else {
            noteContainer.style.display = 'none';
        }

        // Zobrazení boxu s animací
        document.getElementById('route-info-box').classList.add('visible');
        map.flyToBounds(activeLine.getBounds(), { padding: [100, 100], duration: 1 });
    }

    function closeInfoBox() {
        document.getElementById('route-info-box').classList.remove('visible');
        highlightLayer.clearLayers();
        markersLayer.clearLayers();
        document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
    }
</script>
</body>
</html>
