<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>MOSS ROUTES MANAGER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #ff0000; 
            --dark: #0f172a; 
            --black: #000000;
            --white: #ffffff;
            --border: #e2e8f0; 
            --bg: #f8fafc; 
            --gold: #f59e0b; 
            --start-green: #22c55e; 
        }

        body { margin: 0; font-family: 'IBM Plex Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f4f4f4;
            background-image: repeating-linear-gradient(45deg, #eeeeee 0px, #eeeeee 2px, #f4f4f4 2px, #f4f4f4 10px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; 
            transition: opacity 0.8s ease, visibility 0.8s ease;
            opacity: 1;
            visibility: visible;
        }

        #loader-wrapper.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-content { width: max-content; position: relative; padding: 40px; text-align: left; }
        .loader-title { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 600; color: var(--black); letter-spacing: 1px; margin-bottom: 15px; white-space: nowrap; }
        .rect-container { width: 100%; }
        .rect { background: var(--accent); height: 29px; width: 0; margin-bottom: 8px; animation: drawRect 1.2s cubic-bezier(0.7, 0, 0.3, 1) forwards; }
        .rect-thin { height: 15px; animation-delay: 0.2s; }
        @keyframes drawRect { from { width: 0; } to { width: 100%; } }
        .loader-status { margin-top: 30px; font-family: 'IBM Plex Mono', monospace; font-size: 15.5px; color: var(--black); font-weight: 400; letter-spacing: 0.5px; opacity: 0; animation: fadeInStatus 0.5s ease forwards 0.8s; }
        @keyframes fadeInStatus { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #panel { width: 420px; border-right: 1px solid var(--border); background: white; display: flex; flex-direction: column; z-index: 1000; box-shadow: 4px 0 15px rgba(0,0,0,0.05); }
        .tab-nav { background: var(--black); padding: 15px; color: white; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 2px; border-bottom: 3px solid var(--accent); }
        .section { padding: 20px; border-bottom: 1px solid var(--border); }
        h1 { font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; color: #64748b; margin: 0 0 15px 0; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        h1::before { content: ''; width: 3px; height: 12px; background: var(--accent); border-radius: 2px; }
        
        .btn { width: 100%; padding: 12px; cursor: pointer; border-radius: 8px; border: none; font-weight: 600; font-size: 13px; transition: 0.2s; background: var(--black); color: white; }
        .btn:hover { background: var(--accent); }
        
        .route-item { padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .route-item:hover { background: #f8fafc; }
        .route-item.active { background: #fff1f2; border-left: 4px solid var(--accent); }
        .badge-pref { color: var(--gold); font-weight: bold; margin-right: 4px; }
        
        #map { flex-grow: 1; z-index: 1; background: #cbd5e1; position: relative; }
        
        .status-bar { padding: 10px 20px; font-size: 10px; color: #94a3b8; border-top: 1px solid var(--border); display: flex; gap: 10px; background: white; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #cbd5e1; }
        .dot-green { background: var(--start-green); }

        #route-info-box {
            position: absolute; top: 20px; right: 20px; width: 300px; background: white; z-index: 2000;
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid var(--border);
            overflow: hidden; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
            transform: translateX(20px); opacity: 0; pointer-events: none;
        }
        #route-info-box.visible { transform: translateX(0); opacity: 1; pointer-events: auto; }

        .p-container { padding: 20px; }
        .p-header { border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-start; }
        .p-title { color: var(--black); font-weight: 700; font-size: 16px; line-height: 1.2; }
        .p-close { cursor: pointer; color: #94a3b8; font-size: 20px; line-height: 1; }
        .p-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px; color: #334155; }
        .p-icon { width: 28px; font-size: 16px; }
        .p-note { background: #f8fafc; border-radius: 8px; padding: 12px; font-size: 12px; color: #475569; margin-top: 12px; border-left: 4px solid var(--accent); line-height: 1.5; }

        .glow-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.3); position: relative; }
        .glow-dot::before { content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px; border-radius: 50%; animation: pulse-glow 2s infinite; }
        .dot-start { background: var(--start-green); }
        .dot-start::before { background: var(--start-green); opacity: 0.4; }
        .dot-end { background: var(--accent); }
        .dot-end::before { background: var(--accent); opacity: 0.4; }
        @keyframes pulse-glow { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>

<div id="loader-wrapper">
    <div class="loader-content">
        <div class="loader-title">MOSS ROUTES MANAGER (beta)</div>
        <div class="rect-container">
            <div class="rect"></div>
            <div class="rect rect-thin"></div>
        </div>
        <div class="loader-status">
            <div>- načítám mapové podklady...</div>
            <div>- načítám trasy...</div>
        </div>
    </div>
</div>

<div id="panel">
    <div class="tab-nav">MOSS ROUTES MANAGER</div>
    
    <div class="section">
        <h1>Vyhledávání</h1>
        <div style="display:flex; gap: 5px;">
            <input type="text" id="viewerDept" placeholder="Zadej Dept (např. 85)" style="flex:1; padding:10px; border:1px solid var(--border); border-radius:8px; font-family: 'IBM Plex Mono';">
            <button class="btn" style="width:auto; margin:0; padding:0 15px;" onclick="filterByDept()">ZOBRAZIT</button>
        </div>
    </div>

    <div id="route-list" style="flex-grow:1; overflow-y:auto;">
        <div style="padding:20px; color:#94a3b8; font-size:12px; text-align:center;">Systém připraven k vyhledávání.</div>
    </div>

    <div class="status-bar">
        <span><span id="dot-db" class="status-dot"></span> DATABASE</span>
        <span><span id="dot-geo" class="status-dot"></span> GEODATA</span>
    </div>
</div>

<div id="map">
    <div id="route-info-box">
        <div class="p-container">
            <div class="p-header">
                <span id="info-title" class="p-title">Název trasy</span>
                <span class="p-close" onclick="closeInfoBox()">&times;</span>
            </div>
            <div class="p-row">
                <span class="p-icon">📏</span>
                <span><b>Vzdálenost:</b> <span id="info-dist">---</span> km</span>
            </div>
            <div class="p-row">
                <span class="p-icon">💶</span>
                <span><b>Cena:</b> <span id="info-price">---</span> €</span>
            </div>
            <div id="info-note-container" class="p-note">
                <b>Poznámka:</b><br><span id="info-note">---</span>
            </div>
        </div>
    </div>
</div>

<script>
    let allRoutes = [];
    let franceBorders = null;
    
    const map = L.map('map', { zoomControl: false }).setView([46.6, 2.2], 6);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
    
    let routeLayers = L.layerGroup().addTo(map);
    let highlightLayer = L.layerGroup().addTo(map);
    let borderLayer = L.layerGroup().addTo(map);
    let markersLayer = L.layerGroup().addTo(map);

    // DEKODÉR PRO NOVÝ FORMÁT GEOMETRIE
    function decodePolyline(str) {
        let index = 0, lat = 0, lng = 0, coords = [], shift, result, byte;
        while (index < str.length) {
            shift = 0; result = 0;
            do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
            lat += ((result & 1) ? ~(result >> 1) : (result >> 1));
            shift = 0; result = 0;
            do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
            lng += ((result & 1) ? ~(result >> 1) : (result >> 1));
            coords.push([lng / 1e5, lat / 1e5]);
        }
        return coords;
    }

    async function initData() {
        setTimeout(() => {
            const loader = document.getElementById('loader-wrapper');
            if(loader) loader.classList.add('hidden');
        }, 1500);

        try {
            const response = await fetch('routes.json');
            if (!response.ok) throw new Error();
            allRoutes = await response.json();
            document.getElementById('dot-db').classList.add('dot-green');
        } catch (err) {
            document.getElementById('route-list').innerHTML = '<div style="padding:20px; color:#ef4444; font-size:12px;">DATABASE (routes.json) NOT FOUND.</div>';
        }

        try {
            const response = await fetch('france.json');
            if (response.ok) {
                franceBorders = await response.json();
                document.getElementById('dot-geo').classList.add('dot-green');
            }
        } catch (err) {
            console.log("France geodata missing.");
        }
    }

    initData();

    function filterByDept() {
        const deptInput = document.getElementById('viewerDept').value.trim();
        if (!deptInput) return;
        
        const container = document.getElementById('route-list');
        container.innerHTML = '';
        routeLayers.clearLayers();
        highlightLayer.clearLayers();
        borderLayer.clearLayers();
        markersLayer.clearLayers();
        closeInfoBox();

        if (franceBorders) {
            const deptShape = franceBorders.features.find(f => f.properties.code == deptInput);
            if (deptShape) {
                L.geoJSON(deptShape, {
                    style: { color: '#ff0000', weight: 2, fillColor: '#ff0000', fillOpacity: 0.05 }
                }).addTo(borderLayer);
            }
        }

        const filtered = allRoutes.filter(r => r.dept == deptInput);
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="padding:20px; color:#94a3b8; font-size:12px;">Žádné trasy v tomto sektoru.</div>';
            return;
        }

        filtered.forEach(r => {
            // Dekódování geometrie pro zobrazení
            const decodedCoords = decodePolyline(r.geom);
            const geoJsonGeom = { type: "LineString", coordinates: decodedCoords };
            
            const div = document.createElement('div');
            div.className = 'route-item';
            div.innerHTML = `<strong>${r.name}</strong><br><small>${r.distance} km</small>`;
            div.onclick = () => activateRoute(r, div, geoJsonGeom);
            container.appendChild(div);

            // Neviditelná vrstva pro interakci na mapě
            const ghost = L.geoJSON(geoJsonGeom, { style: { color: '#000', weight: 10, opacity: 0 } }).addTo(routeLayers);
            ghost.on('click', () => activateRoute(r, div, geoJsonGeom));
        });
    }

    function activateRoute(r, element, geoJsonGeom) {
        document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
        if (element) element.classList.add('active');
        showRouteOnMap(r, geoJsonGeom);
    }

    function showRouteOnMap(r, geoJsonGeom) {
        highlightLayer.clearLayers();
        markersLayer.clearLayers();
        const box = document.getElementById('route-info-box');
        box.classList.remove('visible');

        const activeLayer = L.geoJSON(geoJsonGeom, { 
            style: { color: '#ff0000', weight: 6, opacity: 1, lineJoin: 'round' } 
        }).addTo(highlightLayer);

        // Markery na začátku a konci ( waypointy z nového formátu: r.wps[n].l )
        if (r.wps && r.wps.length >= 2) {
            const start = r.wps[0].l;
            const end = r.wps[r.wps.length - 1].l;
            
            L.marker([start.lat, start.lng], { icon: L.divIcon({ className: 'glow-dot dot-start', iconSize: [12, 12] }) }).addTo(markersLayer);
            L.marker([end.lat, end.lng], { icon: L.divIcon({ className: 'glow-dot dot-end', iconSize: [12, 12] }) }).addTo(markersLayer);
        }

        setTimeout(() => {
            document.getElementById('info-title').innerText = r.name;
            document.getElementById('info-dist').innerText = r.distance;
            document.getElementById('info-price').innerText = r.price || '---';
            if (r.note) {
                document.getElementById('info-note').innerText = r.note;
                document.getElementById('info-note-container').style.display = 'block';
            } else {
                document.getElementById('info-note-container').style.display = 'none';
            }
            box.classList.add('visible');
        }, 50);

        map.flyToBounds(activeLayer.getBounds(), { padding: [100, 100], duration: 1 });
    }

    function closeInfoBox() {
        document.getElementById('route-info-box').classList.remove('visible');
        highlightLayer.clearLayers();
        markersLayer.clearLayers();
        document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
    }
</script>
</body>
</html>
